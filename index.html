  background: var(--navy);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  /* safe areas for notch + home indicator */
  padding-top: env(safe-area-inset-top);
  padding-bottom: 0;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 16px 20px 12px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.script {
  font-family: 'Hurricane', cursive;
  font-size: 38px;
  color: var(--gold);
  line-height: 1;
}

.date-pill {
  background: var(--teal);
  color: white;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
}

/* ── PROGRESS ── */
.progress-track {
  height: 5px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--magenta));
  border-radius: 10px;
  transition: width 0.5s ease;
}

.progress-label {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 5px;
  letter-spacing: 0.04em;
}

.progress-label strong { color: var(--teal); font-weight: 600; }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 0 120px;
}

/* ── SECTION ── */
.section {
  margin: 0 12px 10px;
  background: var(--cream);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  background: white;
  border-bottom: 1px solid var(--light);
  cursor: pointer;
  user-select: none;
  /* big tap target */
  min-height: 52px;
  -webkit-user-select: none;
}

.section-head:active { background: #f5f2eb; }

.section-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.14em;
  color: var(--navy);
  flex: 1;
}

.section-meta {
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-count {
  font-size: 12px;
  font-weight: 600;
  color: #bbb;
}

.section-count .done-count { color: var(--teal); }

.chevron {
  color: #ccc;
  font-size: 11px;
  transition: transform 0.22s ease;
  line-height: 1;
}

.section.collapsed .chevron { transform: rotate(-90deg); }
.section.collapsed .section-body { display: none; }

/* ── ITEMS ── */
.todo-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  min-height: 52px;
  border-bottom: 1px solid var(--light);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.1s;
  animation: popIn 0.18s ease;
}

@keyframes popIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.todo-item:active { background: #f5f2eb; }
.todo-item:last-of-type { border-bottom: none; }

.todo-item.done .item-text {
  text-decoration: line-through;
  color: #bbb;
}

.checkbox {
  width: 24px;
  height: 24px;
  border: 2px solid #d0ccc4;
  border-radius: 6px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  background: white;
}

.todo-item.done .checkbox {
  background: var(--teal);
  border-color: var(--teal);
}

.checkmark {
  display: none;
  color: white;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
}

.todo-item.done .checkmark { display: block; }

.item-body { flex: 1; padding: 12px 0; }

.item-text {
  font-size: 15px;
  color: var(--navy);
  line-height: 1.4;
}

.item-tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 10px;
  margin-top: 4px;
}

.item-tag.urgent  { background: #fdeef4; color: var(--magenta); }
.item-tag.pending { background: #e8f7f6; color: var(--teal); }
.item-tag.personal{ background: #fef9ec; color: var(--gold); }

/* ── INLINE ADD ── */
.inline-add {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 16px;
  min-height: 48px;
  background: #fdfcf9;
  border-top: 1px solid var(--light);
}

.inline-add input {
  flex: 1;
  border: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--navy);
  padding: 14px 0;
  outline: none;
  /* prevent iOS zoom on focus */
  font-size: 16px;
}

.inline-add input::placeholder { color: #c5c0b8; font-style: italic; font-size: 14px; }

.inline-btn {
  background: var(--teal);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 22px;
  font-weight: 300;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
  line-height: 1;
}

.inline-btn:active { background: #1e8a86; transform: scale(0.93); }

/* ── STICKY BOTTOM ADD BAR ── */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--navy);
  border-top: 3px solid var(--magenta);
  padding: 10px 14px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  z-index: 20;
  display: flex;
  gap: 8px;
  align-items: center;
}

.bottom-bar input {
  flex: 1;
  background: rgba(255,255,255,0.09);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px; /* no iOS zoom */
  color: white;
  outline: none;
}

.bottom-bar input:focus { border-color: var(--teal); }
.bottom-bar input::placeholder { color: rgba(255,255,255,0.28); }

.bottom-bar select {
  background: rgba(255,255,255,0.09);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 12px 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: rgba(255,255,255,0.65);
  outline: none;
  max-width: 90px;
}

.bottom-bar select option { background: #1B2D3E; color: white; }

.add-btn {
  background: var(--magenta);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 16px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.06em;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}

.add-btn:active { background: #c42c68; transform: scale(0.96); }

/* ── CLEAR BTN ── */
.clear-wrap {
  text-align: center;
  padding: 6px 0 0;
}

.clear-btn {
  background: none;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  cursor: pointer;
  padding: 8px 14px;
}

.clear-btn:active { color: var(--magenta); }

/* ── TOAST ── */
.toast {
  position: fixed;
  top: calc(env(safe-area-inset-top) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(-60px);
  background: var(--teal);
  color: white;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 9px 20px;
  border-radius: 20px;
  transition: transform 0.3s ease;
  pointer-events: none;
  z-index: 99;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="script">get it done.</div>
    <div class="date-pill" id="dateLabel"></div>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label"><strong id="doneCount">0</strong> of <strong id="totalCount">0</strong> done</div>
</div>

<div class="scroll-area" id="scrollArea">
  <div id="sectionsWrap"></div>
  <div class="clear-wrap">
    <button class="clear-btn" onclick="clearDone()">✕ Clear completed</button>
  </div>
</div>

<div class="bottom-bar">
  <input id="gInput" placeholder="Quick add…" autocomplete="off" autocorrect="off" />
  <select id="gSection"></select>
  <button class="add-btn" onclick="addGlobal()">ADD</button>
</div>

<div class="toast" id="toast">Saved ✓</div>

<script>
const DEFAULT = [
  {
    id: "work", title: "WORK", icon: "💻", color: "#2AADA8",
    items: [
      { id: 1,  text: "Work on Tamraloo — why is Camps wrong?",                       done: false, tag: "urgent" },
      { id: 2,  text: "Look at sign-up connections — buttons instead of checkboxes?", done: false, tag: "" },
      { id: 3,  text: "Look at all the new stuff in Rezen",                           done: false, tag: "" },
      { id: 4,  text: "Call w/ the vendor",                                           done: false, tag: "" },
    ]
  },
  {
    id: "clients", title: "CLIENT SITES", icon: "🌐", color: "#E8357A",
    items: [
      { id: 10, text: "Tamraloo Studios — continue site build",                       done: false, tag: "pending" },
      { id: 11, text: "Hillery Wallis (painting contractor) — continue site build",   done: false, tag: "pending" },
      { id: 12, text: "Amy Pittard (engraved Pyrex) — continue site build",           done: false, tag: "pending" },
      { id: 13, text: "Roxanne Kalaveras — check DNS / GitHub Pages verification",    done: false, tag: "pending" },
    ]
  },
  {
    id: "visible", title: "VISIBLE. HOUSEKEEPING", icon: "✨", color: "#D4A843",
    items: [
      { id: 20, text: "Link-in-bio — insert real Flodesk form URLs",                  done: false, tag: "pending" },
      { id: 21, text: "Link-in-bio — confirm booking/scheduler links are live",       done: false, tag: "pending" },
      { id: 22, text: "Stan Store — finalize branded product thumbnails",              done: false, tag: "pending" },
    ]
  },
  {
    id: "realestate", title: "REAL ESTATE", icon: "🏡", color: "#1B2D3E",
    items: [
      { id: 30, text: "Take people off Realist",                                      done: false, tag: "" },
      { id: 31, text: "Add Argonaut to Mom's",                                        done: false, tag: "" },
    ]
  },
  {
    id: "personal", title: "PERSONAL", icon: "🌿", color: "#D4A843",
    items: [
      { id: 40, text: "Get bump stuff",                                               done: false, tag: "personal" },
      { id: 41, text: "Pick up Mav",                                                  done: false, tag: "personal" },
    ]
  }
];

let nextId = 200, sections = [], collapsed = {};

function load() {
  try {
    const s = localStorage.getItem('erika_v3');
    if (s) { const p = JSON.parse(s); sections = p.sections; nextId = p.nextId || 200; collapsed = p.collapsed || {}; return; }
  } catch(e) {}
  sections = JSON.parse(JSON.stringify(DEFAULT));
}

function save() {
  try { localStorage.setItem('erika_v3', JSON.stringify({ sections, nextId, collapsed })); } catch(e) {}
  showToast();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}

function toggleItem(secId, itemId) {
  sections.find(s => s.id === secId).items.find(i => i.id === itemId).done ^= true;
  save(); render();
}

function toggleSection(secId) {
  collapsed[secId] = !collapsed[secId];
  save(); render();
}

function addToSection(secId, text) {
  if (!text.trim()) return;
  sections.find(s => s.id === secId).items.push({ id: nextId++, text: text.trim(), done: false, tag: "" });
  save(); render();
  setTimeout(() => {
    const inp = document.querySelector(`[data-inline="${secId}"]`);
    if (inp) inp.focus();
  }, 60);
}

function addGlobal() {
  const txt = document.getElementById('gInput').value.trim();
  const secId = document.getElementById('gSection').value;
  if (!txt) return;
  addToSection(secId, txt);
  document.getElementById('gInput').value = '';
}

function clearDone() {
  sections.forEach(s => { s.items = s.items.filter(i => !i.done); });
  save(); render();
}

function render() {
  // date
  const d = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateLabel').textContent = `${days[d.getDay()]} · ${months[d.getMonth()]} ${d.getDate()}`;

  // progress
  let total = 0, done = 0;
  sections.forEach(s => { total += s.items.length; done += s.items.filter(i => i.done).length; });
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressFill').style.width = (total > 0 ? Math.round(done/total*100) : 0) + '%';

  // sections
  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';

  sections.forEach(sec => {
    const isCol = collapsed[sec.id];
    const secDone = sec.items.filter(i => i.done).length;

    const el = document.createElement('div');
    el.className = 'section' + (isCol ? ' collapsed' : '');

    // header
    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `
      <div class="section-icon" style="background:${sec.color}22">${sec.icon}</div>
      <div class="section-title">${sec.title}</div>
      <div class="section-meta">
        <div class="section-count"><span class="done-count">${secDone}</span>/${sec.items.length}</div>
        <div class="chevron">▾</div>
      </div>
    `;
    head.addEventListener('click', () => toggleSection(sec.id));
    el.appendChild(head);

    // body
    const body = document.createElement('div');
    body.className = 'section-body';

    sec.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'todo-item' + (item.done ? ' done' : '');
      row.innerHTML = `
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <div class="item-body">
          <div class="item-text">${item.text}</div>
          ${item.tag ? `<span class="item-tag ${item.tag}">${item.tag}</span>` : ''}
        </div>
      `;
      row.addEventListener('click', () => toggleItem(sec.id, item.id));
      body.appendChild(row);
    });

    // inline add
    const addRow = document.createElement('div');
    addRow.className = 'inline-add';
    const inp = document.createElement('input');
    inp.placeholder = `Add to ${sec.title.toLowerCase()}…`;
    inp.setAttribute('data-inline', sec.id);
    inp.setAttribute('autocomplete', 'off');
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { addToSection(sec.id, inp.value); inp.value = ''; }
    });
    const btn = document.createElement('button');
    btn.className = 'inline-btn';
    btn.textContent = '+';
    btn.addEventListener('click', () => { addToSection(sec.id, inp.value); inp.value = ''; });
    addRow.appendChild(inp);
    addRow.appendChild(btn);
    body.appendChild(addRow);

    el.appendChild(body);
    wrap.appendChild(el);
  });

  // populate section select in bottom bar
  const sel = document.getElementById('gSection');
  const prev = sel.value;
  sel.innerHTML = '';
  sections.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    // shorten labels for mobile
    const short = { work:'Work', clients:'Clients', visible:'Visible', realestate:'RE', personal:'Personal' };
    opt.textContent = short[s.id] || s.title;
    sel.appendChild(opt);
  });
  if (prev) sel.value = prev;

  // enter key on global input
  document.getElementById('gInput').onkeydown = e => { if (e.key === 'Enter') addGlobal(); };
}

load();
render();
</script>
</body>
</html>
